<!doctype html>
<html data-mode="default">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 36px 24px 84px; background: var(--paper); display: flex; align-items: center; justify-content: center; }
  nav {
    display: flex; align-items: center; gap: 4px;
    padding: 6px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--r-pill);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow: var(--shadow-1);
  }
  .tab {
    position: relative;
    width: 40px; height: 40px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; color: var(--glass-fg);
    border: none; border-radius: var(--r-pill); cursor: pointer;
  }
  .tab.active { background: var(--glass-bg-active); }
  .tab .tip {
    position: absolute; top: calc(100% + 10px); left: 50%; transform: translateX(-50%);
    padding: 6px 10px; background: var(--fg); color: var(--bg);
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    letter-spacing: 0.02em; border-radius: var(--r-xs); white-space: nowrap;
    opacity: 0; pointer-events: none;
    transition: opacity 320ms cubic-bezier(0.16, 1, 0.3, 1) 120ms;
  }
  .tab:hover .tip { opacity: 1; }
  .home-icon {
    display: inline-flex; width: 18px; height: 18px;
    animation: pulseIcon 320ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes pulseIcon {
    0%   { opacity: 0; transform: translateY(2px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <nav>
    <button class="tab active" aria-label="Home">
      <span class="home-icon" id="homeIcon"><i data-lucide="house" style="stroke-width:1.25"></i></span>
      <span class="tip">Home</span>
    </button>
    <button class="tab" aria-label="Projects">
      <i data-lucide="folder" style="stroke-width:1.25"></i>
      <span class="tip">Projects</span>
    </button>
    <button class="tab" aria-label="Me">
      <i data-lucide="user-round" style="stroke-width:1.25"></i>
      <span class="tip">Me</span>
    </button>
  </nav>
<script>
  lucide.createIcons({ attrs: { width: 18, height: 18 } });
  // Alternate the Home icon between house and pointer to hint that Home is a swipe feed.
  let toggle = 0;
  const slot = document.getElementById('homeIcon');
  setInterval(() => {
    toggle = 1 - toggle;
    const name = toggle ? 'pointer' : 'house';
    slot.innerHTML = '<i data-lucide="' + name + '" style="stroke-width:1.25"></i>';
    slot.style.animation = 'none';
    slot.offsetHeight; // reflow to restart anim
    slot.style.animation = '';
    lucide.createIcons({ attrs: { width: 18, height: 18 } });
  }, 2000);
</script>
</body>
</html>

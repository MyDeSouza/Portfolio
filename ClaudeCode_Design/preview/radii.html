<!doctype html>
<html data-mode="default">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 32px; display: flex; gap: 22px; align-items: flex-end; flex-wrap: wrap; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 84px; height: 84px; background: var(--surface); border: 1px solid var(--border); }
  .name { font-family: var(--font-body); font-weight: 500; font-size: 12px; color: var(--fg); letter-spacing: -0.005em; }
  .val { font-family: ui-monospace, monospace; font-size: 10px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="step"><div class="box" style="border-radius: var(--r-xs);"></div><div class="name">r-xs</div><div class="val">6px</div></div>
  <div class="step"><div class="box" style="border-radius: var(--r-sm);"></div><div class="name">r-sm</div><div class="val">10px</div></div>
  <div class="step"><div class="box" style="border-radius: var(--r-md);"></div><div class="name">r-md</div><div class="val">12px</div></div>
  <div class="step"><div class="box" style="border-radius: var(--r-lg);"></div><div class="name">r-lg</div><div class="val">16px</div></div>
  <div class="step"><div class="box" style="border-radius: var(--r-xl);"></div><div class="name">r-xl</div><div class="val">24px</div></div>
  <div class="step"><div class="box" style="border-radius: var(--r-pill);"></div><div class="name">r-pill</div><div class="val">999</div></div>
</body>
</html>

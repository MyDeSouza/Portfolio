<!doctype html>
<html data-mode="default">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px 28px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 16px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 100%; aspect-ratio: 1.2; border-radius: var(--r-sm); border: 1px solid var(--border); }
  .label { font-family: var(--font-body); font-weight: 500; font-size: 11px; color: var(--fg); letter-spacing: -0.005em; }
  .hex { font-family: ui-monospace, monospace; font-size: 10px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="swatch"><div class="chip" style="background: #f7f9fc;"></div><div class="label">Paper</div><div class="hex">#f7f9fc</div></div>
  <div class="swatch"><div class="chip" style="background: #ffffff;"></div><div class="label">Surface</div><div class="hex">#ffffff</div></div>
  <div class="swatch"><div class="chip" style="background: #0c1116;"></div><div class="label">Ink</div><div class="hex">#0c1116</div></div>
  <div class="swatch"><div class="chip" style="background: #3a414d;"></div><div class="label">Ink-2</div><div class="hex">#3a414d</div></div>
  <div class="swatch"><div class="chip" style="background: #7a818e;"></div><div class="label">Ink-3</div><div class="hex">#7a818e</div></div>
  <div class="swatch"><div class="chip" style="background: #bdc2cb;"></div><div class="label">Ink-4</div><div class="hex">#bdc2cb</div></div>
  <div class="swatch"><div class="chip" style="background: #e6e9ef;"></div><div class="label">Line</div><div class="hex">#e6e9ef</div></div>
</body>
</html>

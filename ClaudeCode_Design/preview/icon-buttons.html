<!doctype html>
<html data-mode="project" style="--project: #0e5d3a; --project-fg: #fff;">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 32px; display: flex; gap: 14px; align-items: center; }
  .iconbtn {
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: var(--r-sm); color: var(--glass-fg);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    cursor: pointer;
  }
  .label { font-family: var(--font-body); font-size: 11px; color: var(--fg-muted); letter-spacing: 0.14em; text-transform: uppercase; margin-left: auto; }
</style>
</head>
<body>
  <button class="iconbtn"><i data-lucide="arrow-left" style="stroke-width:1.25"></i></button>
  <button class="iconbtn"><i data-lucide="bookmark" style="stroke-width:1.25"></i></button>
  <button class="iconbtn"><i data-lucide="share-2" style="stroke-width:1.25"></i></button>
  <button class="iconbtn"><i data-lucide="external-link" style="stroke-width:1.25"></i></button>
  <button class="iconbtn"><i data-lucide="x" style="stroke-width:1.25"></i></button>
  <div class="label">Thin · 1.25 · Lucide</div>
<script>lucide.createIcons({ attrs: { width: 18, height: 18 } });</script>
</body>
</html>

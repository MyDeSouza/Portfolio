<!doctype html>
<html data-mode="default">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 0; display: flex; align-items: stretch; height: 380px; }
  .panel { flex: 1; padding: 56px 48px; display: flex; flex-direction: column; justify-content: space-between; }
  .default { background: var(--paper); color: var(--ink); }
  .project { background: #ffb400; color: #fff; }
  h2 { margin: 0; font-family: var(--font-display); font-weight: 500; font-size: 56px; line-height: 1; letter-spacing: -0.025em; color: inherit; }
  .label { font-family: var(--font-body); font-weight: 400; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.6; }
</style>
</head>
<body>
  <div class="panel default">
    <span class="label">Default</span>
    <h2>White walls.</h2>
  </div>
  <div class="panel project">
    <span class="label">Project</span>
    <h2>Inside the work.</h2>
  </div>
</body>
</html>

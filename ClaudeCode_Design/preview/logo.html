<!doctype html>
<html data-mode="default">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 40px 48px; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .logo { display: inline-flex; align-items: baseline; gap: 10px; font-family: var(--font-display); font-weight: 600; font-size: 36px; letter-spacing: -0.022em; color: var(--fg); }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--fg); transform: translateY(-3px); }
  .caption { font-family: var(--font-body); font-size: 12px; color: var(--fg-faint); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 12px; }
</style>
</head>
<body>
  <div class="logo"><span>Max DeSouza</span><span class="dot"></span></div>
  <div class="caption">Wordmark · Urbanist 600 · -0.022em tracking</div>
</body>
</html>

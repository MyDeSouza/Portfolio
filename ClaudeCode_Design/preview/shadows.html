<!doctype html>
<html data-mode="default">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 36px 32px; display: flex; gap: 36px; align-items: center; background: #f3f1ea !important; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box { width: 90px; height: 90px; background: var(--surface); border-radius: var(--r-md); }
  .s1 { box-shadow: var(--shadow-1); }
  .s2 { box-shadow: var(--shadow-2); }
  .s3 { box-shadow: var(--shadow-3); }
  .name { font-family: var(--font-body); font-weight: 500; font-size: 12px; color: var(--fg); letter-spacing: -0.005em; }
  .val { font-family: ui-monospace, monospace; font-size: 10px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="step"><div class="box s1"></div><div class="name">shadow-1</div><div class="val">resting</div></div>
  <div class="step"><div class="box s2"></div><div class="name">shadow-2</div><div class="val">hover</div></div>
  <div class="step"><div class="box s3"></div><div class="name">shadow-3</div><div class="val">floating</div></div>
</body>
</html>

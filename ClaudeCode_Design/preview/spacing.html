<!doctype html>
<html data-mode="default">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 28px 32px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--ink); border-radius: var(--r-xs); }
  .name { font-family: var(--font-body); font-weight: 500; font-size: 11px; color: var(--fg); letter-spacing: -0.005em; }
  .val { font-family: ui-monospace, monospace; font-size: 10px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="box" style="width:4px;height:4px"></div><div class="name">s-1</div><div class="val">4</div></div>
    <div class="step"><div class="box" style="width:8px;height:8px"></div><div class="name">s-2</div><div class="val">8</div></div>
    <div class="step"><div class="box" style="width:12px;height:12px"></div><div class="name">s-3</div><div class="val">12</div></div>
    <div class="step"><div class="box" style="width:16px;height:16px"></div><div class="name">s-4</div><div class="val">16</div></div>
    <div class="step"><div class="box" style="width:24px;height:24px"></div><div class="name">s-5</div><div class="val">24</div></div>
    <div class="step"><div class="box" style="width:32px;height:32px"></div><div class="name">s-6</div><div class="val">32</div></div>
    <div class="step"><div class="box" style="width:48px;height:48px"></div><div class="name">s-7</div><div class="val">48</div></div>
    <div class="step"><div class="box" style="width:64px;height:64px"></div><div class="name">s-8</div><div class="val">64</div></div>
    <div class="step"><div class="box" style="width:96px;height:96px"></div><div class="name">s-9</div><div class="val">96</div></div>
  </div>
</body>
</html>

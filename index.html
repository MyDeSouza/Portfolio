<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Portfolio</title>
  <meta name="description" content="Personal portfolio of Your Name." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a href="/" class="mark">
      <span class="mark-name">Max DeSouza</span>
      <span class="mark-role">Product designer</span>
    </a>
    <div class="nav-pill-wrapper">
      <nav class="nav-pill">
        <a href="/" class="nav-item active" aria-label="Home">
          <span class="home-icon-wrap">
            <img class="icon-scroll" src="/Icons/Home/Scroll_White(Stroke)_SVG.svg" alt="" />
            <img class="icon-coffee" src="/Icons/Home/Coffee_White(Stroke)_SVG.svg" alt="" />
          </span>
        </a>
        <a href="/projects/" class="nav-item" aria-label="Projects">
          <img class="nav-icon" src="/Icons/Project/Projects_White(Stroke)_SVG.svg" alt="" />
        </a>
        <a href="/about/" class="nav-item" aria-label="About">
          <svg class="nav-icon" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="6.5" r="3" stroke="white" stroke-width="1.25"/>
            <path d="M2 16.5c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6" stroke="white" stroke-width="1.25" stroke-linecap="round"/>
          </svg>
        </a>
      </nav>
      <span class="nav-label">Scroll</span>
    </div>
  </header>

  <section class="hero">
    <h1 class="hero-name">Max DeSouza</h1>
    <p class="hero-role">Product designer</p>
    <div class="ticker">
      <span class="ticker-text"></span>
    </div>
  </section>

  <script>
    (function () {
      const items = [
        "User Experience Design (UX)",
        "User Interface Design (UI)",
        "Service Design",
        "Frontend",
        "Backend",
        "Systems Architecture",
        "Rapid Prototyping",
        "User Behavioural Researcher"
      ];
      const el = document.querySelector(".ticker-text");
      let idx = 0;
      let dir = 1; // 1 = left→right, -1 = right→left

      function show() {
        el.textContent = items[idx];
        el.className = "ticker-text " + (dir === 1 ? "enter-left" : "enter-right");
      }

      function cycle() {
        const exitClass = dir === 1 ? "exit-right" : "exit-left";
        el.className = "ticker-text " + exitClass;

        setTimeout(() => {
          idx = (idx + 1) % items.length;
          dir *= -1;
          show();
        }, 420);
      }

      show();
      setInterval(cycle, 3000);
    })();
  </script>

  <div class="page-index">
    <a href="/projects/" class="page-card">
      <div class="page-card-top">
        <span class="page-card-num">01</span>
        <span class="page-card-arrow">→</span>
      </div>
      <h2 class="page-card-title">Projects</h2>
      <p class="page-card-desc">Selected work across design, code, and ideas.</p>
    </a>

    <a href="/sprints/" class="page-card">
      <div class="page-card-top">
        <span class="page-card-num">02</span>
        <span class="page-card-arrow">→</span>
      </div>
      <h2 class="page-card-title">Sprints</h2>
      <p class="page-card-desc">A running log of development sprints and progress.</p>
    </a>

    <a href="/about/" class="page-card">
      <div class="page-card-top">
        <span class="page-card-num">03</span>
        <span class="page-card-arrow">→</span>
      </div>
      <h2 class="page-card-title">About</h2>
      <p class="page-card-desc">Background, values, and how to get in touch.</p>
    </a>
  </div>

  <script src="main.js"></script>
  <footer class="footer">
    <span>© 2026 Your Name</span>
    <span class="footer-mark">Built by hand.</span>
  </footer>
</body>
</html>

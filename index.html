<!DOCTYPE html>
<html lang="en" data-mode="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max DeSouza — Portfolio</title>
  <meta name="description" content="Max DeSouza — product UX designer working across internal tooling, payments, and brand." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

<body>

  <header class="topbar">
    <!-- mark kept in DOM for intro animation; hidden after intro via JS -->
    <a href="/" class="mark topbar-mark-ghost">
      <span class="mark-name">Max DeSouza</span>
    </a>
    <div class="nav-pill-wrapper">
      <nav class="nav-pill">
        <a href="/" class="nav-item active" aria-label="Home">
          <span class="home-icon-wrap">
            <img class="icon-scroll" src="/Icons/Home/Scroll_White(Stroke)_SVG.svg" alt="" />
            <img class="icon-coffee" src="/Icons/Home/Coffee_White(Stroke)_SVG.svg" alt="" />
            <svg class="icon-person" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="8.5" cy="6.5" r="3" stroke="white" stroke-width="1.25"/>
              <path d="M2 16.5c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6" stroke="white" stroke-width="1.25" stroke-linecap="round"/>

          </span>
        </a>
        <a href="/projects/" class="nav-item" aria-label="Projects">
          <img class="nav-icon" src="/Icons/Project/Projects_White(Stroke)_SVG.svg" alt="" />
        </a>
      </nav>
      <span class="nav-label">Home</span>
    </div>
  </header>

  <main>
    <section class="home-hero">
      <p class="eyebrow">Product Designer</p>
      <h1 class="h-display">I develop interfaces tailored to specific touchpoints,<br>aligning user intent with seamless interaction.</h1>
      <p class="h-display">I believe that purposeful design fades into the background,<br>leaving only the user and their goals.</p>
    </section>
  </main>



  <script src="main.js"></script>
</body>
</html>

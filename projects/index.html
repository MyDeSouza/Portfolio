<!DOCTYPE html>
<html lang="en" data-mode="default">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Max DeSouza</title>
  <meta name="description" content="Selected work by Max DeSouza." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

  <div id="page-intro" aria-hidden="true">
    <span class="intro-text">Discover my work</span>
  </div>

  <header class="topbar">
    <a href="/" class="mark">
      <span class="mark-name">Max DeSouza</span>
    </a>
    <div class="nav-pill-wrapper">
      <nav class="nav-pill">
        <a href="/" class="nav-item" aria-label="Home">
          <span class="home-icon-wrap">
            <img class="icon-scroll" src="/Icons/Home/Scroll_White(Stroke)_SVG.svg" alt="" />
            <img class="icon-coffee" src="/Icons/Home/Coffee_White(Stroke)_SVG.svg" alt="" />
          </span>
        </a>
        <a href="/projects/" class="nav-item active" aria-label="Projects">
          <img class="nav-icon" src="/Icons/Project/Projects_White(Stroke)_SVG.svg" alt="" />
        </a>
        <a href="/about/" class="nav-item" aria-label="About">
          <svg class="nav-icon" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.5" cy="6.5" r="3" stroke="white" stroke-width="1.25"/>
            <path d="M2 16.5c0-3.5 3-6 6.5-6s6.5 2.5 6.5 6" stroke="white" stroke-width="1.25" stroke-linecap="round"/>
          </svg>
        </a>
      </nav>
      <span class="nav-label">Projects</span>
    </div>
  </header>

  <main class="page-main">
    <div class="page-header">
      <h1>Discover my work</h1>
    </div>

    <div class="projects-grid">

      <a href="/projects/project-one/" class="project-card">
        <span class="project-card-meta">Product UX</span>
        <div class="project-cover" style="background: #183a5c;">
          <div class="project-cover-reveal">
            <span class="project-cover-title">Project One</span>
          </div>
        </div>
      </a>

      <a href="/projects/project-two/" class="project-card">
        <span class="project-card-meta">Product UX</span>
        <div class="project-cover" style="background: #0e6b7c;">
          <div class="project-cover-reveal">
            <span class="project-cover-title">Project Two</span>
          </div>
        </div>
      </a>

      <a href="/projects/project-three/" class="project-card">
        <span class="project-card-meta">Brand UX</span>
        <div class="project-cover" style="background: #b04f18;">
          <div class="project-cover-reveal">
            <span class="project-cover-title">Project Three</span>
          </div>
        </div>
      </a>

      <a href="/projects/project-four/" class="project-card">
        <span class="project-card-meta">Brand Design</span>
        <div class="project-cover" style="background: #2e5c3a;">
          <div class="project-cover-reveal">
            <span class="project-cover-title">Project Four</span>
          </div>
        </div>
      </a>

    </div>
  </main>

  <footer class="footer">
    <span>© 2026 Max DeSouza</span>
    <span class="footer-mark">Built by hand.</span>
  </footer>

  <script>
  (function () {
    var intro     = document.getElementById('page-intro');
    var introText = intro.querySelector('.intro-text');

    var pageEls = [
      document.querySelector('.topbar'),
      document.querySelector('.page-header h1'),
      document.querySelector('.projects-grid'),
      document.querySelector('.footer'),
    ].filter(Boolean);

    pageEls.forEach(function (el) { el.style.opacity = '0'; });

    function revealPage() {
      pageEls.forEach(function (el, i) {
        setTimeout(function () {
          el.style.opacity = '';
          el.classList.add('page-reveal');
        }, i * 60);
      });
    }

    setTimeout(function () {
      introText.style.opacity   = '1';
      introText.style.transform = 'translateY(0)';
      introText.style.animation = 'none';
      void introText.offsetHeight;
      introText.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      introText.style.opacity    = '0';
      introText.style.transform  = 'translateY(-32px)';

      setTimeout(function () {
        intro.remove();
        revealPage();
      }, 520);
    }, 1800);
  }());
  </script>
  <script src="../main.js"></script>
</body>
</html>
